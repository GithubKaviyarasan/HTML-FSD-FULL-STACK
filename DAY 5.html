<!DOCTYPE html>
<html>
<head>
    <title>Student Database Management System</title>
</head>
<body>

    <h1>Student Database Management System</h1>

    <form>

        <lable>Student Name:</lable>
        <input type="text" size="50" required><br><br>

        <lable>Password:</lable>
        <input type="password" size="50" min="4" max="8"><br><br>

        <lable>Email:</lable>
        <input type="email" size="50" required><br><br>

         <lable>Date of Birth:</lable>
        <input type="date" size="50" required><br><br>


        <lable>Gender:</lable>

        <input type="radio" name="Gender">Male
        <input type="radio" name="Gender">Female<br><br>

        <label>Department:</label>

         <select>

            <option>CS</option>
             <option>BCA</option>
              <option>IT</option>

        </select><br><br>

        <input type="submit" value="Submit"><br><br>

        <input type="reset" value="Reset"><br><br>
        
     </form>

</body>
</html>
