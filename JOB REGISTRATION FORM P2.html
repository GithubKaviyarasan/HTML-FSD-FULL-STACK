<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOB Registration Form</title>
</head>

<body bgcolor="pink">

<center>

<form
style="
border: 3px solid black;
width: 500px;
padding: 20px;
background-color: rgb(148, 130, 130);
border-radius: 10px;
">

<h1>JOB Registration Form</h1>

<table cellpadding="10">

    <tr>
        <td><label for="FName">First Name</label></td>
        <td><input type="text" id="FName" name="FName"></td>
    </tr>

    <tr>
        <td><label for="LName">Last Name</label></td>
        <td><input type="text" id="LName" name="LName"></td>
    </tr>

    <tr>
        <td><label for="DOB">DOB</label></td>
        <td><input type="date" id="DOB" name="DOB"></td>
    </tr>

    <tr>
        <td><label for="Email">Email</label></td>
        <td><input type="email" id="Email" name="Email"></td>
    </tr>

    <tr>
        <td><label for="Phone">Phone</label></td>
        <td><input type="tel" id="Phone" name="Phone"></td>
    </tr>

<tr>
    <td>Gender</td>

    <td>
    <input type="radio" id="Male" name="Gender" value="Male">
    <label for="Male">Male</label>

    <input type="radio" id="Female" name="Gender" value="Female">
    <label for="Female">Female</label>
    </td>

</tr>

    <tr>
    <td>Skills</td>

    <td>
        <input type="checkbox" id="html" name="skill">
        <label for="html">HTML</label>

        <input type="checkbox" id="css" name="skill">
        <label for="css">CSS</label>

        <input type="checkbox" id="javascript" name="skill">
        <label for="javascript">JavaScript</label>
    </td>
</tr>

    <tr>
        <td><label for="Address">Address</label></td>
        <td>
            <textarea id="Address" rows="4" cols="25"></textarea>
        </td>
    </tr>

    <tr>
        <td><label for="City">City</label></td>
        <td><input type="text" id="City"></td>
    </tr>

    <tr>
        <td><label for="State">State</label></td>
        <td><input type="text" id="State"></td>
    </tr>

    <tr>
        <td><label for="Zip">Zip Code</label></td>
        <td><input type="text" id="Zip"></td>
    </tr>

    <tr>
        <td colspan="2" align="center">
            <input type="submit" value="Submit">
        </td>

         <td colspan="2" align="center">
            <input type="reset" value="Clear">
        </td>

    </tr> 

       </table>

    </form>

   </center>

   </body>
</html>
